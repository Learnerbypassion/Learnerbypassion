name: Update GitHub Profile Statistics

on:
  schedule:
    # Runs every day at 3:00 AM UTC
    - cron: "0 3 * * *"

  # Runs whenever this workflow is updated
  push:
    paths:
      - ".github/workflows/update-readme-stats.yml"

  # Allows you to run it manually
  workflow_dispatch:

jobs:
  generate-statistics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v6

      - name: Generate GitHub statistics card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=aura&hide_border=false&include_all_commits=true&rank_icon=github
          path: profile/stats.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=aura&hide_border=false&layout=compact&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate contribution streak card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=aura&hide_border=false&disable_animations=true
          path: profile/streak.svg
          token: ${{ secrets.GH_PAT }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update GitHub profile statistics" || exit 0
          git push
